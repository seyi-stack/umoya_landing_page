<!--
=================================================================
  UMOYA FOUNDER'S CIRCLE — SECTION 03: BE AMONG THE FIRST
=================================================================
  ELEMENTOR USAGE:
  • Add an "HTML" widget after the Form section.
  • id="fc-be-first" is the anchor target from the Hero's
    "Learn More" ghost button.
  • The right column is a 4-slide auto-advancing carousel.
    Arrows and dot-nav are fully accessible (ARIA roles set).
  • IMAGES: Replace each <img> src with your Founder's Circle
    Drive images. Order: Image 1 → 2 → 3 → 4 from the brief.
=================================================================
-->

<section id="fc-be-first" aria-label="%%UEW_FC_BE_FIRST_ATTR_001_ARIA_LABEL%%">
  <div class="fc-bf-wrap">
    <div class="fc-bf-grid">

      <!-- ── COPY ──────────────────────────────── -->
      <div class="fc-bf-reveal">
        <span class="fc-bf-eyebrow">%%UEW_FC_BE_FIRST_TEXT_001%%</span>
        <h2 class="fc-bf-title">
          %%UEW_FC_BE_FIRST_TEXT_002%% <em>%%UEW_FC_BE_FIRST_TEXT_003%%</em>

        <span class="fc-bf-rule" aria-hidden="true"></span>

        <div class="fc-bf-body">

      <!-- ── SLIDESHOW ──────────────────────────── -->

        <div class="fc-ss-track">

          <!-- Slide 1 — ★ SWAP src with Drive Image 1 -->
          <div class="fc-ss-slide fc-ss-on" role="group" aria-label="%%UEW_FC_BE_FIRST_ATTR_004_ARIA_LABEL%%" aria-roledescription="slide">
            <img

          <div class="fc-ss-slide" role="group" aria-label="%%UEW_FC_BE_FIRST_ATTR_007_ARIA_LABEL%%" aria-roledescription="slide">

          <div class="fc-ss-slide" role="group" aria-label="%%UEW_FC_BE_FIRST_ATTR_010_ARIA_LABEL%%" aria-roledescription="slide">

              loading="lazy"

        <button class="fc-ss-arrow fc-ss-prev" id="fc3Prev" aria-label="%%UEW_FC_BE_FIRST_ATTR_019_ARIA_LABEL%%">
