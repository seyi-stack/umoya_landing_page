<!--
=================================================================
  UMOYA FOUNDER'S CIRCLE — SECTION 02: FORM — YOUR HOMECOMING
  Layout  : 100dvh · Grid 1fr / 2fr · no overflow anywhere
  Strategy: clamp()+vh units scale all spacing proportionally.
           Right col is a flex column — card grows to fill space.
           Inside the card: 7-row grid where the textarea row
           is 1fr so it absorbs all leftover height naturally.
           No scrollbars. No overflow. Fits at every viewport ≥768px.
=================================================================
  ELEMENTOR: HTML widget directly below Section 01 (Hero).
  id="fc-form-section" is the anchor for all CTA buttons.
  HUBSPOT: Form keeps the custom visual design and submits through
           HubSpot's Forms API once Portal ID and Form ID are added.
=================================================================
-->

<section id="fc-form-section" aria-label="%%UEW_FC_FORM_ATTR_001_ARIA_LABEL%%">

  <div class="fc-f2-outer">

    <!-- =========================================================
         LEFT — Image panel (1fr)
         Fills the full 100dvh height via position:absolute+inset:0.
         overflow:hidden clips the image to the column — structural only.
         Text is bottom-center aligned.
         ========================================================= -->
    <div class="fc-f2-img-col" aria-hidden="true">
      <img
        src="%%UEW_FC_FORM_MEDIA_002_SRC%%"
        alt="%%UEW_FC_FORM_ATTR_003_ALT%%"
      />
      <div class="fc-f2-img-ov"></div>
      <div class="fc-f2-img-txt">
        <span class="fc-f2-img-eye">%%UEW_FC_FORM_TEXT_001%%</span>
        <h2 class="fc-f2-img-ttl">%%UEW_FC_FORM_TEXT_002%%</h2>
        <span class="fc-f2-img-rule"></span>
      </div>
    </div>

    <!-- =========================================================
         RIGHT — Form panel (2fr)
         Flex column. Card grows. Textarea absorbs leftover height.
         No overflow property on this column.
         ========================================================= -->
    <div class="fc-f2-form-col">
      <div class="fc-f2-inner">

        <!-- SECTION HEADER -->
        <div class="fc-f2-hd fc-f2-rv">
          <span class="fc-f2-eye">%%UEW_FC_FORM_TEXT_003%%</span>
          <h2 class="fc-f2-ttl">%%UEW_FC_FORM_TEXT_004%%</h2>
          <span class="fc-f2-rule" aria-hidden="true"></span>
          <p class="fc-f2-sub">%%UEW_FC_FORM_TEXT_005%%</p>
        </div>

        <!-- FORM CARD -->
        <div class="fc-f2-card fc-f2-rv d1">

            HUBSPOT INTEGRATION:
            Paste the HubSpot Portal ID and Form GUID into the data attributes
            on this form. The JavaScript below maps each visible input to the
            HubSpot property names used by the published HubSpot form.
          -->

            class="fc-f2-form"
            id="fc2Form"
            action="%%UEW_FC_FORM_URL_004_ACTION%%"
            method="post"
            target="umoyaSubmissionFrame"
            novalidate
            aria-label="%%UEW_FC_FORM_ATTR_005_ARIA_LABEL%%"
            data-hubspot-portal-id="%%UEW_FC_FORM_INT_006_HUBSPOT_PORTAL_ID%%"
            data-hubspot-form-id="%%UEW_FC_FORM_INT_007_HUBSPOT_FORM_ID%%"
            data-umoya-form-source="%%UEW_FC_FORM_INT_008_UMOYA_FORM_SOURCE%%"
            data-wordpress-backup-endpoint="%%UEW_FC_FORM_URL_009_WORDPRESS_BACKUP_ENDPOINT%%"
            data-hubspot-consent-text="%%UEW_FC_FORM_INT_010_HUBSPOT_CONSENT_TEXT%%"
          >
            <input type="hidden" name="source" value="%%UEW_FC_FORM_INT_008_UMOYA_FORM_SOURCE%%">
            <input type="hidden" name="hubspotPortalId" value="%%UEW_FC_FORM_INT_006_HUBSPOT_PORTAL_ID%%">
            <input type="hidden" name="hubspotFormId" value="%%UEW_FC_FORM_INT_007_HUBSPOT_FORM_ID%%">
            <input type="hidden" name="consentText" value="%%UEW_FC_FORM_INT_010_HUBSPOT_CONSENT_TEXT%%">
            <input type="hidden" name="hutk" value="">
            <input type="hidden" name="pageUri" value="">
            <input type="hidden" name="pageName" value="">

            <div class="fc-f2-fg">

              <!-- Row 1: Title | spacer -->
              <div class="fc-f2-field">
                <label for="fc2Title">%%UEW_FC_FORM_TEXT_006%%</label>
                <select id="fc2Title" name="MERGE1">
                  <option value="" disabled selected>Select…</option>
                  <option value="Mr.">Mr.</option>
                  <option value="Mrs.">Mrs.</option>
                  <option value="Ms.">Ms.</option>
                  <option value="Miss">Miss</option>
                  <option value="Dr.">Dr.</option>
                  <option value="Prof.">Prof.</option>
                </select>
              </div>
              <div aria-hidden="true"></div>

              <!-- Row 2: First Name | Last Name -->
              <div class="fc-f2-field">
                <label for="fc2First">%%UEW_FC_FORM_TEXT_007%% <span class="fc-f2-req" aria-hidden="true">*</span></label>
                <input type="text" id="fc2First" name="FNAME" placeholder="%%UEW_FC_FORM_ATTR_011_PLACEHOLDER%%" required autocomplete="given-name" />
              </div>
              <div class="fc-f2-field">
                <label for="fc2Last">%%UEW_FC_FORM_TEXT_008%% <span class="fc-f2-req" aria-hidden="true">*</span></label>

              <!-- Row 3: Email | Phone -->
