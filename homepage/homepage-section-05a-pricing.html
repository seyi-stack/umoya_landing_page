<section id="fc-pricing" aria-label="Founder's Circle journey pricing">
  <style>
    #fc-pricing {
      --cream: #F5F0EB;
      --brown: #4B2E2B;
      --terra: #D97E53;
      --white: #FFFFFF;
      --ease: cubic-bezier(.25,.46,.45,.94);

      background: var(--cream);
      padding: 26px 0 62px;
      color: var(--brown);
      box-sizing: border-box;
    }

    #fc-pricing *,
    #fc-pricing *::before,
    #fc-pricing *::after {
      box-sizing: border-box;
    }

    #fc-pricing .fc-pri-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px;
    }

    #fc-pricing .fc-pri-card {
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
      align-items: center;
      justify-content: center;
      gap: clamp(24px, 5vw, 48px);
      min-height: 136px;
      padding: 34px clamp(34px, 5vw, 52px);
      background: var(--white);
      border: 1px solid rgba(75,46,43,.06);
      border-radius: 8px;
      box-shadow: 0 14px 38px rgba(75,46,43,.08);
    }

    #fc-pricing .fc-pri-main {
      min-width: 0;
    }

    #fc-pricing .fc-pri-rv {
      opacity: 1;
      transform: none;
    }

    #fc-pricing .fc-pri-rv.fc-pri-on {
      opacity: 1;
      transform: none;
    }

    #fc-pricing .fc-pri-label {
      margin: 0 0 8px;
      color: var(--terra);
      font-size: .52rem;
      font-weight: 700;
      letter-spacing: .24em;
      line-height: 1.4;
      text-transform: uppercase;
    }

    #fc-pricing .fc-pri-value {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 0 0 2px;
    }

    #fc-pricing .fc-pri-price {
      margin: 0;
      color: var(--brown);
      font-size: clamp(2.25rem, 4.2vw, 3.2rem);
      font-weight: 500;
      letter-spacing: 0;
      line-height: .82;
    }

    #fc-pricing .fc-pri-person {
      color: var(--brown);
      font-size: .86rem;
      font-weight: 700;
      letter-spacing: 0;
      line-height: .4;
    }

    #fc-pricing .fc-pri-save {
      margin: 0;
      color: var(--terra);
      font-size: clamp(.92rem, .7vw, 1.16rem);
      font-style: italic;
      font-weight: 300;
      line-height: 1.25;
    }

    #fc-pricing .fc-pri-side {
      display: grid;
      justify-items: center;
      gap: 14px;
      width: 100%;
      min-width: 0;
    }

    #fc-pricing .fc-pri-limited {
      margin: 0;
      color: var(--brown);
      font-size: .55rem;
      font-weight: 800;
      letter-spacing: .24em;
      line-height: 1.45;
      text-align: center;
      text-transform: uppercase;
    }

    #fc-pricing .fc-pri-btn {
      appearance: none;
      -webkit-appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 42px;
      padding: 20px 20px;
      background: var(--terra);
      border: 2px solid var(--terra);
      color: var(--white);
      cursor: pointer;
      font-size: .98rem;
      font-weight: 700;
      letter-spacing: .16em;
      line-height: 1.2;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      overflow-wrap: anywhere;
      transition: background .25s var(--ease), border-color .25s var(--ease),
                  box-shadow .25s var(--ease), transform .25s var(--ease);
    }

    @media (max-width: 1024px) {
      #fc-pricing .fc-pri-card {
        grid-template-columns: 1fr;
        gap: 26px;
        min-height: 0;
        text-align: center;
      }

      #fc-pricing .fc-pri-value {
        justify-content: center;
      }

      #fc-pricing .fc-pri-side {
        width: min(100%, 320px);
        margin: 0 auto;
      }
    }

    #fc-pricing .fc-pri-btn:hover {
      background: #C06840;
      border-color: #C06840;
      color: var(--white);
      box-shadow: 0 10px 26px rgba(217,126,83,.28);
      transform: translateY(-2px);
    }

    @media (max-width: 560px) {
      #fc-pricing {
        padding: 22px 0 56px;
      }

      #fc-pricing .fc-pri-wrap {
        padding: 0 18px;
      }

      #fc-pricing .fc-pri-card {
        padding: 34px 22px;
      }

      #fc-pricing .fc-pri-label {
        letter-spacing: .18em;
      }

      #fc-pricing .fc-pri-value {
        display: block;
      }

      #fc-pricing .fc-pri-person {
        display: block;
        margin-top: 10px;
      }

      #fc-pricing .fc-pri-btn {
        min-height: 48px;
        font-size: .82rem;
        letter-spacing: .12em;
        padding: 16px 18px;
      }

      #fc-pricing .fc-pri-limited {
        letter-spacing: .18em;
      }
    }
  </style>

<div class="fc-pri-wrap">
    <div class="fc-pri-card fc-pri-rv" role="note">
      <div class="fc-pri-main">
        <p class="fc-pri-label">Founder's Circle Exclusive</p>
        <div class="fc-pri-value">
          <h3 class="fc-pri-price">$12,500</h3>
          <p class="fc-pri-person">per person</p>
        </div>
        <h3 class="fc-pri-save">Save $2,500 from regular pricing</h3>
      </div>
      <div class="fc-pri-side">
        <button type="button" class="fc-pri-btn" data-umoya-form-popup>CLAIM MY SPECIAL OFFER</button>
        <p class="fc-pri-limited">Limited to founding guests</p>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  'use strict';
  var root = document.getElementById('fc-pricing');
  if (!root) return;

  var rvEls = root.querySelectorAll('.fc-pri-rv');
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('fc-pri-on'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.15 });
    rvEls.forEach(function(el) { obs.observe(el); });
  } else {
    rvEls.forEach(function(el) { el.classList.add('fc-pri-on'); });
  }
})();
</script>
