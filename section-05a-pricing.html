<!--
=================================================================
  UMOYA FOUNDER'S CIRCLE - SECTION 05A: PRICING OFFER
=================================================================
  ELEMENTOR USAGE:
  - Add an "HTML" widget after Section 05 (Journey).
  - Clean pricing card using only approved offer copy.
=================================================================
-->
<style>
  #fc-pricing {
    --cream: #F5F0EB;
    --brown: #4B2E2B;
    --terra: #D97E53;
    --white: #FFFFFF;
    --ease: cubic-bezier(.25,.46,.45,.94);

    background: var(--cream);
    padding: 36px 0 88px;
    font-family: inherit;
    color: var(--brown);
    box-sizing: border-box;
  }

  #fc-pricing *,
  #fc-pricing *::before,
  #fc-pricing *::after {
    box-sizing: border-box;
  }

  .fc-pri-wrap {
    max-width: 1060px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .fc-pri-card {
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(260px, .95fr) minmax(260px, 1fr) auto;
    align-items: center;
    gap: clamp(28px, 4vw, 54px);
    padding: clamp(34px, 4.6vw, 50px) clamp(30px, 5vw, 64px);
    background: var(--white);
    border: 1px solid rgba(75,46,43,.12);
    border-radius: 10px;
    box-shadow: 0 14px 44px rgba(75,46,43,.09);
  }

  .fc-pri-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--terra);
  }

  .fc-pri-rv {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity .85s var(--ease), transform .85s var(--ease);
  }

  .fc-pri-rv.fc-pri-on {
    opacity: 1;
    transform: none;
  }

  .fc-pri-label {
    margin: 0 0 14px;
    color: var(--terra);
    font-family: inherit;
    font-size: .74rem;
    font-weight: 700;
    letter-spacing: .22em;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .fc-pri-price {
    margin: 0;
    color: var(--brown);
    font-family: inherit;
    font-size: clamp(2.7rem, 5.4vw, 4.5rem);
    font-weight: 500;
    letter-spacing: 0;
    line-height: .95;
  }

  .fc-pri-person {
    display: block;
    margin-top: 12px;
    color: rgba(75,46,43,.72);
    font-family: inherit;
    font-size: .86rem;
    font-weight: 600;
    letter-spacing: .16em;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .fc-pri-rule {
    width: 1px;
    height: 96px;
    margin: 0;
    background: rgba(75,46,43,.14);
  }

  .fc-pri-meta {
    display: grid;
    gap: 10px;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .fc-pri-meta li {
    color: var(--brown);
    font-family: inherit;
    font-size: .98rem;
    font-weight: 500;
    line-height: 1.45;
  }

  .fc-pri-meta li + li {
    padding-top: 10px;
    border-top: 1px solid rgba(75,46,43,.12);
  }

  .fc-pri-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 50px;
    padding: 14px 28px;
    background: var(--terra);
    border: 2px solid var(--terra);
    color: var(--white);
    font-family: inherit;
    font-size: .76rem;
    font-weight: 700;
    letter-spacing: .16em;
    line-height: 1.2;
    text-align: center;
    text-decoration: none;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background .25s var(--ease), border-color .25s var(--ease),
                box-shadow .25s var(--ease), transform .25s var(--ease);
  }

  .fc-pri-btn:hover {
    background: #C06840;
    border-color: #C06840;
    color: var(--white);
    box-shadow: 0 10px 26px rgba(217,126,83,.28);
    transform: translateY(-2px);
  }

  @media (max-width: 900px) {
    .fc-pri-card {
      grid-template-columns: 1fr;
      gap: 26px;
      text-align: center;
    }

    .fc-pri-rule {
      width: 100%;
      max-width: 360px;
      height: 1px;
      margin: 0 auto;
    }

    .fc-pri-meta {
      max-width: 420px;
      margin: 0 auto;
    }

    .fc-pri-btn {
      width: fit-content;
      margin: 0 auto;
    }
  }

  @media (max-width: 560px) {
    #fc-pricing {
      padding: 24px 0 64px;
    }

    .fc-pri-wrap {
      padding: 0 18px;
    }

    .fc-pri-card {
      padding: 38px 22px;
    }

    .fc-pri-label {
      font-size: .68rem;
      letter-spacing: .16em;
    }

    .fc-pri-meta {
      display: block;
    }

    .fc-pri-meta li + li {
      margin-top: 10px;
      padding-top: 10px;
    }

    .fc-pri-btn { width: 100%; }
  }
</style>

<section id="fc-pricing" aria-label="Founder's Circle journey pricing">
  <div class="fc-pri-wrap">
    <div class="fc-pri-card fc-pri-rv" role="note">
      <p class="fc-pri-label">Founder's Circle Exclusive</p>
      <p class="fc-pri-price">$12,500 <span class="fc-pri-person">per person</span></p>
      <div class="fc-pri-rule" aria-hidden="true"></div>
      <ul class="fc-pri-meta" aria-label="Founder's Circle pricing details">
        <li>Save $2,500 from regular pricing</li>
        <li>Limited to founding guests</li>
      </ul>
      <a href="#fc-form-section" class="fc-pri-btn">Reserve My Place</a>
    </div>
  </div>
</section>

<script>
(function(){
  'use strict';
  var rvEls = document.querySelectorAll('#fc-pricing .fc-pri-rv');
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('fc-pri-on'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.15 });
    rvEls.forEach(function(el) { obs.observe(el); });
  } else {
    rvEls.forEach(function(el) { el.classList.add('fc-pri-on'); });
  }
})();
</script>
