<!--
=================================================================
  UMOYA FOUNDER'S CIRCLE - SECTION 05A: PRICING OFFER
=================================================================
  ELEMENTOR USAGE:
  - Add an "HTML" widget after Section 05 (Journey).
  - Clean pricing card using only approved offer copy.
=================================================================
-->
<style>
  #fc-pricing {
    --cream: #F5F0EB;
    --brown: #4B2E2B;
    --terra: #D97E53;
    --white: #FFFFFF;
    --ease: cubic-bezier(.25,.46,.45,.94);

    background: var(--cream);
    padding: 36px 0 88px;
    font-family: inherit;
    color: var(--brown);
    box-sizing: border-box;
  }

  #fc-pricing *,
  #fc-pricing *::before,
  #fc-pricing *::after {
    box-sizing: border-box;
  }

  .fc-pri-wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .fc-pri-card {
    position: relative;
    overflow: hidden;
    padding: clamp(42px, 6vw, 64px) clamp(28px, 6vw, 72px);
    background: var(--white);
    border: 1px solid rgba(75,46,43,.12);
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 14px 44px rgba(75,46,43,.09);
  }

  .fc-pri-card::before {
    content: '';
    display: block;
    width: 52px;
    height: 2px;
    margin: 0 auto 26px;
    background: var(--terra);
  }

  .fc-pri-rv {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity .85s var(--ease), transform .85s var(--ease);
  }

  .fc-pri-rv.fc-pri-on {
    opacity: 1;
    transform: none;
  }

  .fc-pri-label {
    margin: 0 0 18px;
    color: var(--terra);
    font-family: inherit;
    font-size: .74rem;
    font-weight: 700;
    letter-spacing: .22em;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .fc-pri-price {
    margin: 0;
    color: var(--brown);
    font-family: inherit;
    font-size: clamp(3rem, 8vw, 5.6rem);
    font-weight: 500;
    letter-spacing: 0;
    line-height: .95;
  }

  .fc-pri-person {
    display: block;
    margin-top: 12px;
    color: rgba(75,46,43,.72);
    font-family: inherit;
    font-size: .86rem;
    font-weight: 600;
    letter-spacing: .16em;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .fc-pri-rule {
    width: 100%;
    max-width: 360px;
    height: 1px;
    margin: 30px auto;
    background: rgba(75,46,43,.14);
  }

  .fc-pri-meta {
    display: flex;
    justify-content: center;
    gap: 22px;
    flex-wrap: wrap;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .fc-pri-meta li {
    color: var(--brown);
    font-family: inherit;
    font-size: .94rem;
    font-weight: 500;
    line-height: 1.45;
  }

  .fc-pri-meta li + li {
    position: relative;
    padding-left: 24px;
  }

  .fc-pri-meta li + li::before {
    content: '';
    position: absolute;
    left: 0;
    top: .68em;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--terra);
  }

  @media (max-width: 560px) {
    #fc-pricing {
      padding: 24px 0 64px;
    }

    .fc-pri-wrap {
      padding: 0 18px;
    }

    .fc-pri-card {
      padding: 38px 22px;
    }

    .fc-pri-label {
      font-size: .68rem;
      letter-spacing: .16em;
    }

    .fc-pri-meta {
      display: block;
    }

    .fc-pri-meta li + li {
      margin-top: 10px;
      padding-left: 0;
    }

    .fc-pri-meta li + li::before {
      display: none;
    }
  }
</style>

<section id="fc-pricing" aria-label="Founder's Circle journey pricing">
  <div class="fc-pri-wrap">
    <div class="fc-pri-card fc-pri-rv" role="note">
      <p class="fc-pri-label">Founder's Circle Exclusive</p>
      <p class="fc-pri-price">$12,500 <span class="fc-pri-person">per person</span></p>
      <div class="fc-pri-rule" aria-hidden="true"></div>
      <ul class="fc-pri-meta" aria-label="Founder's Circle pricing details">
        <li>Save $2,500 from regular pricing</li>
        <li>Limited to founding guests</li>
      </ul>
    </div>
  </div>
</section>

<script>
(function(){
  'use strict';
  var rvEls = document.querySelectorAll('#fc-pricing .fc-pri-rv');
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('fc-pri-on'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.15 });
    rvEls.forEach(function(el) { obs.observe(el); });
  } else {
    rvEls.forEach(function(el) { el.classList.add('fc-pri-on'); });
  }
})();
</script>
