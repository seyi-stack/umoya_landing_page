<!--
=================================================================
  UMOYA FOUNDER'S CIRCLE - SECTION 05A: PRICING OFFER
=================================================================
  ELEMENTOR USAGE:
  - Add an "HTML" widget after Section 05 (Journey).
  - Clean pricing card using only approved offer copy.
=================================================================
-->
<style>
  #fc-pricing {
    --cream: #F5F0EB;
    --brown: #4B2E2B;
    --terra: #D97E53;
    --white: #FFFFFF;
    --ease: cubic-bezier(.25,.46,.45,.94);

    background: var(--cream);
    padding: 32px 0 72px;
    font-family: inherit;
    color: var(--brown);
    box-sizing: border-box;
  }

  #fc-pricing *,
  #fc-pricing *::before,
  #fc-pricing *::after {
    box-sizing: border-box;
  }

  .fc-pri-wrap {
    max-width: 1480px;
    margin: 0 auto;
    padding: 0 clamp(20px, 3vw, 34px);
  }

  .fc-pri-card {
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(320px, 385px);
    align-items: center;
    gap: clamp(42px, 7vw, 92px);
    min-height: 314px;
    padding: clamp(58px, 6vw, 84px) clamp(54px, 6.8vw, 88px);
    background: var(--white);
    border: 1px solid rgba(75,46,43,.06);
    border-radius: 18px;
    box-shadow: 0 16px 42px rgba(75,46,43,.08);
  }

  .fc-pri-rv {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity .85s var(--ease), transform .85s var(--ease);
  }

  .fc-pri-rv.fc-pri-on {
    opacity: 1;
    transform: none;
  }

  .fc-pri-label {
    margin: 0 0 24px;
    color: var(--terra);
    font-family: inherit;
    font-size: clamp(.88rem, 1.28vw, 1.15rem);
    font-weight: 700;
    letter-spacing: .34em;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .fc-pri-value {
    display: flex;
    align-items: baseline;
    gap: clamp(18px, 2.6vw, 28px);
    margin: 0 0 10px;
  }

  .fc-pri-price {
    margin: 0;
    color: var(--brown);
    font-family: inherit;
    font-size: clamp(5.1rem, 9vw, 7.3rem);
    font-weight: 500;
    letter-spacing: 0;
    line-height: .82;
  }

  .fc-pri-person {
    color: var(--brown);
    font-family: inherit;
    font-size: clamp(1.25rem, 2vw, 1.75rem);
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1.4;
  }

  .fc-pri-save {
    margin: 0;
    color: var(--terra);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.35rem, 2.3vw, 2rem);
    font-style: italic;
    font-weight: 500;
    line-height: 1.25;
  }

  .fc-pri-side {
    display: grid;
    justify-items: center;
    gap: 34px;
  }

  .fc-pri-limited {
    margin: 0;
    color: var(--brown);
    font-family: inherit;
    font-size: clamp(.9rem, 1.35vw, 1.12rem);
    font-weight: 800;
    letter-spacing: .34em;
    line-height: 1.45;
    text-align: center;
    text-transform: uppercase;
  }

  .fc-pri-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 105px;
    padding: 24px 32px;
    background: var(--terra);
    border: 2px solid var(--terra);
    color: var(--white);
    font-family: inherit;
    font-size: clamp(.95rem, 1.35vw, 1.2rem);
    font-weight: 700;
    letter-spacing: .18em;
    line-height: 1.2;
    text-align: center;
    text-decoration: none;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background .25s var(--ease), border-color .25s var(--ease),
                box-shadow .25s var(--ease), transform .25s var(--ease);
  }

  .fc-pri-btn:hover {
    background: #C06840;
    border-color: #C06840;
    color: var(--white);
    box-shadow: 0 10px 26px rgba(217,126,83,.28);
    transform: translateY(-2px);
  }

  @media (max-width: 900px) {
    .fc-pri-card {
      grid-template-columns: 1fr;
      gap: 36px;
      min-height: 0;
      text-align: center;
    }

    .fc-pri-value {
      justify-content: center;
    }

    .fc-pri-side {
      width: min(100%, 385px);
      margin: 0 auto;
    }
  }

  @media (max-width: 560px) {
    #fc-pricing {
      padding: 24px 0 64px;
    }

    .fc-pri-wrap {
      padding: 0 18px;
    }

    .fc-pri-card {
      padding: 42px 22px;
      border-radius: 14px;
    }

    .fc-pri-label {
      letter-spacing: .2em;
    }

    .fc-pri-value {
      display: block;
    }

    .fc-pri-person {
      display: block;
      margin-top: 10px;
    }

    .fc-pri-btn {
      min-height: 78px;
    }

    .fc-pri-limited {
      letter-spacing: .22em;
    }
  }
</style>

<section id="fc-pricing" aria-label="Founder's Circle journey pricing">
  <div class="fc-pri-wrap">
    <div class="fc-pri-card fc-pri-rv" role="note">
      <div class="fc-pri-main">
        <p class="fc-pri-label">Founder's Circle Exclusive</p>
        <div class="fc-pri-value">
          <p class="fc-pri-price">$12,500</p>
          <p class="fc-pri-person">per person</p>
        </div>
        <p class="fc-pri-save">Save $2,500 from regular pricing</p>
      </div>
      <div class="fc-pri-side">
        <a href="#fc-form-section" class="fc-pri-btn">Reserve My Place</a>
        <p class="fc-pri-limited">Limited to founding guests</p>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  'use strict';
  var rvEls = document.querySelectorAll('#fc-pricing .fc-pri-rv');
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('fc-pri-on'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.15 });
    rvEls.forEach(function(el) { obs.observe(el); });
  } else {
    rvEls.forEach(function(el) { el.classList.add('fc-pri-on'); });
  }
})();
</script>
