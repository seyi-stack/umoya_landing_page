<!--
=================================================================
  UMOYA FOUNDER'S CIRCLE - SECTION 05A: PRICING OFFER
=================================================================
  ELEMENTOR USAGE:
  - Add this "HTML" widget immediately after Section 05 (Your Journey Begins Here).
  - Clean pricing card using only approved offer copy.
=================================================================
-->
<style>
  #fc-pricing {
    --cream: #F5F0EB;
    --brown: #4B2E2B;
    --terra: #D97E53;
    --white: #FFFFFF;
    --ease: cubic-bezier(.25,.46,.45,.94);

    background: var(--cream);
    padding: 26px 0 62px;
    font-family: inherit;
    color: var(--brown);
    box-sizing: border-box;
  }

  #fc-pricing *,
  #fc-pricing *::before,
  #fc-pricing *::after {
    box-sizing: border-box;
  }

  .fc-pri-wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .fc-pri-card {
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(152px, 1fr);
    align-items: center;
    gap: clamp(28px, 6vw, 60px);
    min-height: 136px;
    padding: 34px clamp(34px, 5vw, 52px);
    background: var(--white);
    border: 1px solid rgba(75,46,43,.06);
    border-radius: 8px;
    box-shadow: 0 14px 38px rgba(75,46,43,.08);
  }

  .fc-pri-rv {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity .85s var(--ease), transform .85s var(--ease);
  }

  .fc-pri-rv.fc-pri-on {
    opacity: 1;
    transform: none;
  }

  .fc-pri-label {
    margin: 0 0 8px;
    color: var(--terra);
    font-family: inherit;
    font-size: .52rem;
    font-weight: 700;
    letter-spacing: .24em;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .fc-pri-value {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 0 0 2px;
  }

  .fc-pri-price {
    margin: 0;
    color: var(--brown);
    font-family: inherit;
    font-size: clamp(2.25rem, 4.2vw, 3.2rem);
    font-weight: 500;
    letter-spacing: 0;
    line-height: .82;
  }

  .fc-pri-person {
    color: var(--brown);
    font-family: inherit;
    font-size: .86rem;
    font-weight: 700;
    letter-spacing: 0;
    line-height: .4;
  }

  .fc-pri-save {
    margin: 0;
    color: var(--terra);
    font-family: inherit;
    font-size: clamp(.92rem, .7vw, 1.16rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.25;
  }

  .fc-pri-side {
    display: grid;
    justify-items: center;
    gap: 14px;
  }

  .fc-pri-limited {
    margin: 0;
    color: var(--brown);
    font-family: inherit;
    font-size: .55rem;
    font-weight: 800;
    letter-spacing: .24em;
    line-height: 1.45;
    text-align: center;
    text-transform: uppercase;
  }

  .fc-pri-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 42px;
    padding: 20px 20px;
    background: var(--terra);
    border: 2px solid var(--terra);
    color: var(--white);
    font-family: inherit;
    font-size: .98rem;
    font-weight: 700;
    letter-spacing: .16em;
    line-height: 1.2;
    text-align: center;
    text-decoration: none;
    text-transform: uppercase;
    white-space: nowrap;
    transition: background .25s var(--ease), border-color .25s var(--ease),
                box-shadow .25s var(--ease), transform .25s var(--ease);
  }

  .fc-pri-btn:hover {
    background: #C06840;
    border-color: #C06840;
    color: var(--white);
    box-shadow: 0 10px 26px rgba(217,126,83,.28);
    transform: translateY(-2px);
  }

  @media (max-width: 900px) {
    .fc-pri-card {
      grid-template-columns: 1fr;
      gap: 24px;
      min-height: 0;
      text-align: center;
    }

    .fc-pri-value {
      justify-content: center;
    }

    .fc-pri-side {
      width: min(100%, 240px);
      margin: 0 auto;
    }
  }

  @media (max-width: 560px) {
    #fc-pricing {
      padding: 22px 0 56px;
    }

    .fc-pri-wrap {
      padding: 0 18px;
    }

    .fc-pri-card {
      padding: 34px 22px;
    }

    .fc-pri-label {
      letter-spacing: .18em;
    }

    .fc-pri-value {
      display: block;
    }

    .fc-pri-person {
      display: block;
      margin-top: 10px;
    }

    .fc-pri-btn {
      min-height: 48px;
    }

    .fc-pri-limited {
      letter-spacing: .18em;
    }
  }
</style>

<section id="fc-pricing" aria-label="Founder's Circle journey pricing">
  <div class="fc-pri-wrap">
    <div class="fc-pri-card fc-pri-rv" role="note">
      <div class="fc-pri-main">
        <p class="fc-pri-label">Founder's Circle Exclusive</p>
        <div class="fc-pri-value">
          <h3 class="fc-pri-price">$12,500</h3>
          <p class="fc-pri-person">per person</p>
        </div>
        <h3 class="fc-pri-save">Save $2,500 from regular pricing</h3>
      </div>
      <div class="fc-pri-side">
        <a href="#fc-form-section" class="fc-pri-btn">Claim my special offer</a>
        <p class="fc-pri-limited">Limited to founding guests</p>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  'use strict';
  var rvEls = document.querySelectorAll('#fc-pricing .fc-pri-rv');
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('fc-pri-on'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.15 });
    rvEls.forEach(function(el) { obs.observe(el); });
  } else {
    rvEls.forEach(function(el) { el.classList.add('fc-pri-on'); });
  }
})();
</script>
